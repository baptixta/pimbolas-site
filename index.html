<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pimbolas</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <main>
        <header>
            <img class="game-logo" src="img/Logo.png" alt="Pimbolas Logo" title="Pimbolas Logo">
        </header>

        <section class="trailer">
            <iframe width="600" height="315" src="https://www.youtube.com/embed/5FfXYFrRjEk?si=cU6283BpfGiCibZz"
                title="YouTube video player" frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

            <a class="no-link" href="https://store.steampowered.com/app/4163970/Pimbolas_Demo/" target="_blank">
                <button class="btn-play">
                    <img src="img/game-icon.png" alt="Game Icon" title="Game Icon">
                    <h2>Play the demo on steam</h2>
                </button>
            </a>
        </section>

        <section class="contact">
            <h2 class="title-h2">Contact us</h2>
            <div class="social-media">
                <div class="social-media-btn">
                    <a class="no-link" href="https://x.com/NanoKnightStdio" target="_blank">
                        <img src="img/Group.png" alt="Twitter" title="twitter">
                    </a>
                </div>

                <div class="social-media-btn">
                    <a class="no-link" href="https://www.youtube.com/@nanoknightstudio" target="_blank">
                        <img src="img/mdi_youtube.png" alt="Youtube Channel" title="Youtube Channel">
                    </a>
                </div>

                <div class="social-media-btn">
                    <a class="no-link" href="https://www.linkedin.com/company/nano-knight-studio/" target="_blank">
                        <img src="img/ri_linkedin-fill.png" alt="Linkedin" title="Linkedin">
                    </a>
                </div>

                <div class="social-media-btn">
                    <a class="no-link" href="mailto:nanoknight.studio@gmail.com" target="_blank">
                        <img src="img/mdi_gmail.png" alt="Gmail" title="Gmail">
                    </a>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
